<mat-toolbar>
  <a class="logo" routerLink="/dashboard">⚡ TaskFlow</a>
  <span class="spacer"></span>

  <button mat-button routerLink="/dashboard" routerLinkActive="mat-primary">
    <mat-icon>dashboard</mat-icon> Tableau de bord
  </button>

  <button mat-icon-button [matMenuTriggerFor]="userMenu" class="user-btn">
    <mat-icon>account_circle</mat-icon>
  </button>

  <mat-menu #userMenu="matMenu">
    <div style="padding: 12px 16px; border-bottom: 1px solid var(--border);">
      <div style="font-weight: 600;">{{ authService.currentUser?.username }}</div>
      <div style="font-size: 0.8rem; color: var(--text-secondary);">{{ authService.currentUser?.email }}</div>
    </div>
    <button mat-menu-item (click)="authService.logout()">
      <mat-icon>logout</mat-icon> Se déconnecter
    </button>
  </mat-menu>
</mat-toolbar>
