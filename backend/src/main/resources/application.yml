spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/taskflow}
    username: ${DATABASE_USERNAME:taskflow}
    password: ${DATABASE_PASSWORD:taskflow}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:taskflow-secret-key-change-in-production-minimum-256-bits-long}
  expiration: 86400000

logging:
  level:
    com.taskflow: INFO
    org.springframework.security: WARN
